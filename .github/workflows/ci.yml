name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build & Test (Maven)
        run: mvn -B -ntp clean test

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build & Test
        run: |
          cd rust-services
          cargo test --workspace
