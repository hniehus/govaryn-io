{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "govaryn.fullname" . }}-postgres
  labels:
    app.kubernetes.io/name: {{ include "govaryn.name" . }}
spec:
  containers:
    - name: postgres
      image: {{ .Values.postgres.image }}
      env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.auth.username | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgres.auth.password | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.auth.database | quote }}
      ports:
        - containerPort: 5432
{{- end -}}
